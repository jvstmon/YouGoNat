<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YOU GO NAT!</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    :root {
      --success: #22c55e;
      --primary: #111827;
    }

    * { box-sizing: border-box; }

    html {
      font-size: clamp(16px, 1vw + 0.5rem, 20px);
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
      color: var(--primary);
      text-align: center;
      font-size: 1rem;
      line-height: 1.4;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 14px 16px;
      font-weight: 700;
      font-size: 18px;
      color: white;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container { padding: 16px; }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      text-align: center;
    }

    button {
      padding: 14px 16px;
      margin: 0;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      transition: all 0.15s ease;
    }

    button:active { transform: scale(0.95); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary-btn {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(34,197,94,0.3);
    }

    .mood-grid { 
      display: grid; 
      grid-template-columns: repeat(2, 1fr);
      gap: 10px; 
      margin-top: 10px; 
      width: 100%; 
    }

        /* 📱 MOBILE */
    @media (max-width: 600px) {
      .mood-grid {
        grid-template-columns: 1fr;
      }

      .emoji-btn {
        font-size: 18px;
        padding: 16px;
      }

      .cheat-btn span {
        font-size: 16px;
      }
    }

    /* 💻 DESKTOP */
    @media (min-width: 601px) {
      .mood-grid {
        grid-template-columns: repeat(4, 1fr);
      }

      .emoji-btn {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 14px 10px;
        border-radius: 16px;
        background: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        text-align: center;
        word-break: break-word;
        font-size: 16px;
        min-height: 90px;
      }

      .emoji-btn:hover {
        transform: scale(1.2);
      }
    }

    .selected {
      background: var(--success) !important;
      color: white;
    }

    .hidden { display: none; }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .nav-btn {
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .nav-btn:active {
      transform: scale(0.9);
      background: rgba(255,255,255,0.35);
    }

    .streak-day {
      background: #fb923c !important; /* pomarańczowy */
      color: white;
      font-weight: bold;
    }

    #dayModal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
  }

  .modal-content {
    background: white;
    padding: 20px;
    border-radius: 16px;
    width: 85%;
    max-width: 400px;
    text-align: left;
  }

  #dayModal.show {
    display: flex;
  }

  .cheat-day { 
    background: #60a5fa !important; /* niebieski */ 
    color: white; 
    font-weight: bold; 
  } 
  
  .cheat-btn {
    background: linear-gradient(135deg, #60a5fa, #6366f1); 
    color: white; 
  } 
  
  .cheat-btn span {
    font-size: 12px; 
    opacity: 0.9; 
    color: white; 
  }

  @media (max-width: 600px) {
  .cheat-btn span {
    font-size: 16px;
  }
}

  input, textarea {
    font-size: 16px;
  }

  #activities {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-top: 10px;
  }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <button class="nav-btn" onclick="goHome()">🏠</button>
    <div class="nav-title">YOU GO NAT!</div>
    <div style="display:flex; gap:8px;">
      <button class="nav-btn" onclick="openSettings()">⚙️</button>
      <button class="nav-btn" onclick="goHistory()">📅</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="container">

    <div class="card">
      <h1>🔥 Streak: <span id="streak">0</span> </h1>
    </div>

    <div class="card" id="energy-screen"> 
      <h2>Co tam dzisiaj działasz?</h2> 
      <div class="mood-grid"> 
        <button class="emoji-btn cheat-btn" onclick="useCheatDay()"> 
          😈 <br> 
          <span>P***le, nie robie</span> 
        </button> 
        
        <button class="emoji-btn" onclick="selectEnergy('low')"> 
          😴 <br> 
          <span>Minimum!</span> 
        </button> 
        
        <button class="emoji-btn" onclick="selectEnergy('medium')"> 
          🙂 <br> 
          <span>Na luzie</span> 
        </button> 
        
        <button class="emoji-btn" onclick="selectEnergy('high')"> 
          🔥 <br> 
          <span>JAZDA!</span>
        </button> 
      </div> 
    </div>

    <div class="card hidden" id="activities-screen">
      <button onclick="goBack()">⬅️ Wróć</button>
      <h2>Aktywności do wyboru:</h2>
      <div id="activities"></div>
        <input 
          type="number" 
          id="caloriesInput" 
          placeholder="Spalone kcal 🔥"
          style="padding:10px; border-radius:10px; border:1px solid #ddd; width:80%; margin-top:10px;"
        />
        <button id="doneBtn" class="primary-btn" disabled onclick="completeDay()">Zrobione ✔️</button>
    </div>

  </div>

  <!-- HISTORY SCREEN -->
  <div class="card hidden" id="history-screen">

    <div style="display:flex; justify-content:space-between; align-items:center;">
      <button onclick="changeMonth(-1)">⬅️</button>
      <h2 id="month-title">Month</h2>
      <button onclick="changeMonth(1)">➡️</button>
    </div>

    <div id="calendar-wrapper">

    <!-- dni tygodnia -->
    <div id="weekdays"
       style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; margin-top:16px; font-weight:600;">
      <div>Pn</div>
      <div>Wt</div>
      <div>Śr</div>
      <div>Cz</div>
      <div>Pt</div>
      <div>Sb</div>
      <div>Nd</div>
    </div>

    <!-- kalendarz -->
    <div id="calendar"
       style="display:grid; grid-template-columns: repeat(7, 1fr); gap:8px; margin-top:8px;">
    </div>

    <h3 style="margin-top:60px;">📋 Historia aktywności</h3>

    <div id="history-list"></div>

</div>

  </div>

  <div id="dayModal" class="hidden">
  <div class="modal-content">
    <h3 id="modal-date"></h3>
    <div id="modal-list"></div>
    <button onclick="closeModal()">Zamknij</button>
  </div>
</div>

<div class="card hidden" id="settings-screen">
  <h2>⚙️ Ustawienia aktywności</h2>
  <p class="hint">
    Personalizuj swoje aktywności edytując listę. <br> 
    Aktywności rozdzielaj przecinkami.
  </p>

  <h3>😴 Minimum</h3>
  <textarea id="lowInput" style="width:100%; height:80px;"></textarea>

  <h3>🙂 Na luzie</h3>
  <textarea id="midInput" style="width:100%; height:80px;"></textarea>

  <h3>🔥 JAZDA!</h3>
  <textarea id="highInput" style="width:100%; height:80px;"></textarea>

  <button class="primary-btn" onclick="saveSettings()">Zapisz ✔️</button>
</div>

  <!-- JS -->
  <script>

function formatDatePL(dateStr) {
  const date = new Date(dateStr);

  return date.toLocaleDateString("pl-PL", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}

let streak = Number(localStorage.getItem("streak") || 0);

function openSettings() {
  document.getElementById("energy-screen").classList.add("hidden");
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("history-screen").classList.add("hidden");
  document.getElementById("settings-screen").classList.remove("hidden");

  // (opcjonalnie) wczytaj zapisane dane do textarea
  const data = getActivities();

  document.getElementById("lowInput").value = data.low.join(", ");
  document.getElementById("midInput").value = data.medium.join(", ");
  document.getElementById("highInput").value = data.high.join(", ");
}

function saveSettings() {
  const newData = {
    low: document.getElementById("lowInput").value
      .split(",")
      .map(x => x.trim())
      .filter(Boolean),

    medium: document.getElementById("midInput").value
      .split(",")
      .map(x => x.trim())
      .filter(Boolean),

    high: document.getElementById("highInput").value
      .split(",")
      .map(x => x.trim())
      .filter(Boolean),
  };

  // 🔥 NADPISZ stare dane (ważne)
  localStorage.removeItem("activitiesData");
  localStorage.setItem("activitiesData", JSON.stringify(newData));

  alert("Zapisano ustawienia 🔥");

  goHome();
}

function safeParse(key) { 
  try { return JSON.parse(localStorage.getItem(key)) || []; 
  } catch { 
    return []; 
  } 
}

let logs = safeParse("logs");
let cheatDays = safeParse("cheatDays");

let currentEnergy = null;
let selectedActivity = null;

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();

const streakEl = document.getElementById("streak");
if (streakEl) streakEl.innerText = streak;

const activitiesData = {
  low: ["15 minutowy spacer z Tokajkiem", "Joga w domku", "3 tańce z Monią", "Zabawy na basenie", "Krótki Nordic walking", "4 partie wchodzenia i schodzenia po naszych schodach"],
  medium: ["30 minutowy spacer z Tokajkiem", "Dłuższy Nordic walking", "Rolki", "Pole dance w domku", "Luźne bieganie", "Pływanie"],
  high: ["Rolki", "Biegowa jazda!", "Squash", "Pole dance", "Siłownia", "Trening boksu z Monią", "Bouldering"]
};

function getActivities() {
  const saved = JSON.parse(localStorage.getItem("activitiesData"));
  if (!saved) return activitiesData;

  // 🔥 jeśli stare dane (np. obiekty zamiast stringów)
  if (Array.isArray(saved.low) && typeof saved.low[0] === "object") {
    return activitiesData;
  }

  return saved;
}

// 🔧 SYNC z localStorage
function syncLogs() {
  logs = JSON.parse(localStorage.getItem("logs") || "[]");
}

function hasActivityToday() { 
  const today = new Date().toDateString(); 
  return logs.some(l => l.date === today && l.entries.length > 0); 
}

function selectEnergy(level) {
  currentEnergy = level;
  selectedActivity = null;

  document.getElementById("energy-screen").classList.add("hidden");
  document.getElementById("activities-screen").classList.remove("hidden");

  const container = document.getElementById("activities");
  const doneBtn = document.getElementById("doneBtn");

  container.innerHTML = "";
  doneBtn.disabled = true;
  doneBtn.classList.remove("pulse");

  getActivities()[level].forEach(act => {
    const btn = document.createElement("button");
    btn.innerText = act;

    btn.onclick = () => {
      const allBtns = container.querySelectorAll("button");
      allBtns.forEach(b => b.classList.remove("selected"));

      btn.classList.add("selected");
      selectedActivity = act;

      doneBtn.disabled = false;
      doneBtn.classList.add("pulse");
    };

    container.appendChild(btn);
  });
}


function goBack() {
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("energy-screen").classList.remove("hidden");
  document.getElementById("settings-screen").classList.add("hidden");

  const doneBtn = document.getElementById("doneBtn");
  doneBtn.disabled = true;
  doneBtn.classList.remove("pulse");

  selectedActivity = null;
}

function completeDay() {
  const calories = document.getElementById("caloriesInput").value;
  const today = new Date().toDateString();

  // 🔥 jeśli był cheat → usuń go 
  if (cheatDays.includes(today)) { 
    cheatDays = cheatDays.filter(d => d !== today); 
    localStorage.setItem("cheatDays", JSON.stringify(cheatDays)); 
  } 
  
  if (!selectedActivity) { 
    alert("Wybierz aktywność 💡"); 
    return; 
  }

  // 🔥 ZAWSZE zapisuj aktywność (historia)
  let dayLog = logs.find(l => l.date === today);

  if (!dayLog) {
    dayLog = {
      date: today,
      entries: []
    };
    logs.push(dayLog);
  }

  dayLog.entries.push({
  activity: selectedActivity,
  energy: currentEnergy,
  calories: calories ? Number(calories) : 0
  });

  localStorage.setItem("logs", JSON.stringify(logs));

  updateStreakUI();

  alert("🔥 Zapisane do historii!");

  // reset UI
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("energy-screen").classList.remove("hidden");
  document.getElementById("caloriesInput").value = "";

  selectedActivity = null;
  currentEnergy = null;

  syncLogs();
  renderHistoryList();
  renderCalendar();
  updateCheatButton();
}

function goHome() {
  document.getElementById("energy-screen").classList.remove("hidden");
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("history-screen").classList.add("hidden");
  document.getElementById("settings-screen").classList.add("hidden");
}

function goHistory() {
  syncLogs();

  document.getElementById("energy-screen").classList.add("hidden");
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("history-screen").classList.remove("hidden");
  document.getElementById("settings-screen").classList.add("hidden");

  renderCalendar();
  renderHistoryList();
}

function changeMonth(step) {
  currentMonth += step;

  if (currentMonth < 0) {
    currentMonth = 11;
    currentYear--;
  }

  if (currentMonth > 11) {
    currentMonth = 0;
    currentYear++;
  }

  renderCalendar();
}

function renderCalendar() {
  const calendar = document.getElementById("calendar");
  const title = document.getElementById("month-title");

  const monthNames = [
    "Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec",
    "Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"
  ];

  title.innerText = `${monthNames[currentMonth]} ${currentYear}`;
  calendar.innerHTML = "";

  let firstDay = new Date(currentYear, currentMonth, 1).getDay();
  firstDay = (firstDay + 6) % 7;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let day = 1; day <= daysInMonth; day++) {
    const cell = document.createElement("div");

    cell.style.padding = "10px";
    cell.style.borderRadius = "10px";
    cell.style.background = "#fff";
    cell.style.boxShadow = "0 2px 6px rgba(0,0,0,0.05)";
    cell.style.fontSize = "14px";

    const dateKey = new Date(currentYear, currentMonth, day).toDateString();
    const dayLog = logs.find(l => l.date === dateKey);
    const isCheat = cheatDays.includes(dateKey); 
    
    if ((dayLog && dayLog.entries.length > 0) || isCheat) { 
      let emojis = ""; 
      if (isCheat && (!dayLog || dayLog.entries.length === 0)) {  
        // tylko cheat day 
        emojis = "😈"; 
      } else if (dayLog && dayLog.entries.length > 0) { 
        // normalne aktywności 
        emojis = dayLog.entries.map(entry => { 
          return entry.energy === "low" ? "😴" : 
          entry.energy === "medium" ? "🙂" : "🔥"; 
        }).join(" "); 
        
        // jeśli był cheat + aktywność (opcjonalnie) 
        if (isCheat) { 
          emojis += " 😈"; 
        } 
      }

      cell.innerHTML = `${day}<br>${emojis}`;
      cell.style.cursor = "pointer";

      cell.onclick = () => {
        openDayModal(dateKey); 
      };
      
      if (isStreakDay(dateKey)) {
        cell.classList.add("streak-day");
      }

      if (isCheat) {
        cell.classList.add("cheat-day");
      }

    } else { 
      cell.innerHTML = `${day}`; 
      cell.style.opacity = "0.5"; 
    } 
      
    calendar.appendChild(cell);
  } 
}

function renderHistoryList() {
  const container = document.getElementById("history-list");
  container.innerHTML = "";

  const sortedLogs = [...logs].reverse();

  if (sortedLogs.length === 0) {
    container.innerHTML = "<p>Brak zapisanych aktywności</p>";
    return;
  }

  sortedLogs.forEach(day => {
    const dayBox = document.createElement("div");

    dayBox.style.background = "#fff";
    dayBox.style.padding = "10px";
    dayBox.style.borderRadius = "12px";
    dayBox.style.marginBottom = "8px";
    dayBox.style.boxShadow = "0 2px 6px rgba(0,0,0,0.05)";
    dayBox.style.fontSize = "14px";
    dayBox.style.textAlign = "left";

    let html = `<strong>${formatDatePL(day.date)}</strong><br><br>`;

    day.entries.forEach(entry => {
      const emoji =
        entry.energy === "low" ? "😴" :
        entry.energy === "medium" ? "🙂" : "🔥";

      html += `${emoji} ${entry.activity} (${entry.calories || 0} kcal)<br>`;
    });

    dayBox.innerHTML = html;
    container.appendChild(dayBox);
  });
}

function isStreakDay(dateStr) {
  const allDays = [
    ...logs.filter(l => l.entries.length > 0).map(l => l.date),
    ...cheatDays
  ];

  const uniqueDays = [...new Set(allDays)]
    .map(d => new Date(d))
    .sort((a, b) => b - a);

  if (uniqueDays.length === 0) return false;

  let current = new Date();
  current.setHours(0,0,0,0);

  for (let i = 0; i < uniqueDays.length; i++) {
    const day = new Date(uniqueDays[i]);
    day.setHours(0,0,0,0);

    const diff = (current - day) / (1000 * 60 * 60 * 24);

    if (diff === 0 || diff === 1) {
      if (day.toDateString() === dateStr) return true;
      current.setDate(current.getDate() - 1);
    } else {
      break;
    }
  }

  return false;
}

function openDayModal(dateStr) {
  const modal = document.getElementById("dayModal");
  const title = document.getElementById("modal-date");
  const list = document.getElementById("modal-list");

  const dayLog = logs.find(l => l.date === dateStr);

  title.innerText = formatDatePL(dateStr);
  list.innerHTML = "";

  if (!dayLog || dayLog.entries.length === 0) {
    list.innerHTML = "<p>Brak aktywności</p>";
    modal.classList.add("show");
    return;
  }

  dayLog.entries.forEach((entry, index) => {
    const emoji =
      entry.energy === "low" ? "😴" :
      entry.energy === "medium" ? "🙂" : "🔥";

    const item = document.createElement("div");

    item.style.padding = "8px";
    item.style.borderBottom = "1px solid #eee";

    item.innerHTML = `
      ${emoji} ${entry.activity}
      <br>
      🔥 <input 
        type="number" 
        value="${entry.calories || 0}" 
        onchange="editCalories('${dateStr}', ${index}, this.value)"
        style="width:80px; margin-top:5px;"
      />
      <button onclick="deleteEntry('${dateStr}', ${index})">🗑️</button>
    `;

    list.appendChild(item);
  });

  modal.classList.add("show");
}

  function closeModal() {
    document.getElementById("dayModal").classList.remove("show");
  }

  function deleteEntry(dateStr, index) {
  let dayLog = logs.find(l => l.date === dateStr);

    if (!dayLog) return;

    dayLog.entries.splice(index, 1);

    // jeśli brak entries → usuń dzień
    if (dayLog.entries.length === 0) {
      logs = logs.filter(l => l.date !== dateStr);
    }

    localStorage.setItem("logs", JSON.stringify(logs));

    syncLogs();
    updateStreakUI();
    renderCalendar();
    renderHistoryList();
    updateCheatButton();
    closeModal();
  }

  document.getElementById("dayModal").onclick = function(e) {
  if (e.target.id === "dayModal") {
    closeModal();
  }
};

function editCalories(dateStr, index, newCalories) {
  let dayLog = logs.find(l => l.date === dateStr);
  if (!dayLog) return;

  dayLog.entries[index].calories = Number(newCalories) || 0;

  localStorage.setItem("logs", JSON.stringify(logs));

  syncLogs();
  renderHistoryList();
  renderCalendar();
}

function calculateStreak() { 
  if (!logs.length && !cheatDays.length) return 0; 
  
  const allDays = [ 
    ...logs.filter(l => l.entries.length > 0).map(l => l.date), 
    ...cheatDays 
  ]; 
  
  const uniqueDays = [...new Set(allDays)] 
  .map(d => new Date(d)) 
  .sort((a, b) => b - a); 
  
  if (uniqueDays.length === 0) return 0; 
  
  let streak = 0; 
  let current = new Date(); 
  current.setHours(0,0,0,0); 
  
  for (let i = 0; i < uniqueDays.length; i++) { 
    const day = new Date(uniqueDays[i]); 
    day.setHours(0,0,0,0); 
    
    const diff = (current - day) / (1000 * 60 * 60 * 24); 
    
    if (diff === 0 || diff === 1) { 
      streak++; 
      current.setDate(current.getDate() - 1); 
    } else { 
      break; 
    } 
  } 
  
  return streak; 
} 

function updateStreakUI() { 
  streak = calculateStreak(); 
  localStorage.setItem("streak", streak); 
  streakEl.innerText = streak; 
} 

function useCheatDay() { 
  const today = new Date().toDateString(); 
  
  // sprawdź czy już użyty dziś 
  if (cheatDays.includes(today)) { 
    alert("Już użyłaś cheat day dziś 😅"); 
    return; 
  } 
  
  // sprawdź czy w tym tygodniu już był cheat 
  const now = new Date(); 
  const weekAgo = new Date(); 
  weekAgo.setDate(now.getDate() - 7); 
  
  const usedThisWeek = cheatDays.some(d => { 
    const date = new Date(d); 
    return date >= weekAgo; 
  }); 
  
  if (usedThisWeek) { 
    alert("Masz tylko 1 cheat day na tydzień 😉"); 
    return; 
  } 
  
  cheatDays.push(today); 
  localStorage.setItem("cheatDays", JSON.stringify(cheatDays)); 
  
  alert("😈 Cheat day aktywowany!"); 
  
  updateStreakUI(); 
  renderCalendar(); 
  updateCheatButton(); 
} 

function updateCheatButton() { 
  const btn = document.querySelector("button[onclick='useCheatDay()']"); 
  if (!btn) return; 
  const now = new Date(); 
  const weekAgo = new Date(); 
  weekAgo.setDate(now.getDate() - 7); 
  
  const usedThisWeek = cheatDays.some(d => { 
    const date = new Date(d); 
    return date >= weekAgo; 
  }); 
  
  const todayHasActivity = hasActivityToday(); 
  
  // 👉 NOWA LOGIKA: 
  if (usedThisWeek || todayHasActivity) { 
    btn.style.display = "none"; 
  } else { 
    btn.style.display = "inline-block"; 
  } 
} 

updateStreakUI(); 
updateCheatButton();

</script>
