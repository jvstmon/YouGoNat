<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU GO NATALIA!</title>

  
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --primary: #111827;
      --accent: #6366f1;
      --accent-soft: #e0e7ff;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(180deg, #eef2ff, #f8fafc);
      color: var(--primary);
      text-align: center;
    }

    .navbar {
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 14px 16px;
      font-weight: 700;
      font-size: 18px;
      color: white;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container { padding: 16px; }

    .card {
      background: var(--card);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      margin-bottom: 16px;
      text-align: center;
    }

    button {
      padding: 14px 16px;
      margin: 8px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #e0e7ff, #c7d2fe);
      transition: all 0.15s ease;
    }

    button:active { transform: scale(0.95); }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .primary-btn {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(34,197,94,0.3);
    }

    .emoji-btn {
      font-size: 34px;
      background: transparent;
    }

    .emoji-btn:hover { transform: scale(1.2); }

    .selected {
      background: var(--success) !important;
      color: white;
    }

    .hidden { display: none; }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="navbar">
	  <div onclick="goHome()" class="nav-left">🏠</div>

  <div class="nav-title">YOU GO NATALIA!</div>

  <div onclick="goHistory()" class="nav-right">📅</div>

</div>

  <div class="container">

    <div class="card">
      <h1>🔥 Streak: <span id="streak">0</span></h1>
    </div>

    <div class="card" id="energy-screen">
      <h2>Jak się dziś czujesz?</h2>
      <button class="emoji-btn" onclick="selectEnergy('low')">😴</button>
      <button class="emoji-btn" onclick="selectEnergy('medium')">🙂</button>
      <button class="emoji-btn" onclick="selectEnergy('high')">🔥</button>
    </div>

    <div class="card hidden" id="activities-screen">
      <button onclick="goBack()">⬅️ Wróć</button>
      <h2>Twoje aktywności:</h2>
      <div id="activities"></div>
      <button id="doneBtn" class="primary-btn" disabled onclick="completeDay()">Zrobione ✔️</button>
    </div>

  </div>

<script>
let streak = localStorage.getItem("streak") || 0;
let lastDate = localStorage.getItem("lastDate");
let logs = JSON.parse(localStorage.getItem("logs") || "[]");

let currentEnergy = null;
let selectedActivity = null;

const streakEl = document.getElementById("streak");
streakEl.innerText = streak;

const activitiesData = {
  low: ["Spacer", "Nordic walking", "Rozciąganie", "Spokojne pływanie"],
  medium: ["Rolki", "Szybki marsz", "Lekki bieg", "Pływanie"],
  high: ["Squash", "Pole dance", "Siłownia", "Intensywny trening"]
};

function selectEnergy(level) {
  currentEnergy = level;
  selectedActivity = null;

  document.getElementById("energy-screen").classList.add("hidden");
  document.getElementById("activities-screen").classList.remove("hidden");

  const container = document.getElementById("activities");
  const doneBtn = document.getElementById("doneBtn");

  container.innerHTML = "";
  doneBtn.disabled = true;
  doneBtn.classList.remove("pulse");

  activitiesData[level].forEach(act => {
    const btn = document.createElement("button");
    btn.innerText = act;

    btn.onclick = () => {
      const allBtns = container.querySelectorAll("button");
      allBtns.forEach(b => b.classList.remove("selected"));

      btn.classList.add("selected");
      selectedActivity = act;

      doneBtn.disabled = false;
      doneBtn.classList.add("pulse");
    };

    container.appendChild(btn);
  });
}

function goBack() {
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("energy-screen").classList.remove("hidden");

  const doneBtn = document.getElementById("doneBtn");
  doneBtn.disabled = true;
  doneBtn.classList.remove("pulse");

  selectedActivity = null;
}

function completeDay() {
  const today = new Date().toDateString();

  if (!selectedActivity) {
    alert("Wybierz aktywność 💡");
    return;
  }

  if (lastDate === today) {
    alert("Już dziś zaliczone 💪");
    return;
  }

  // update streak
  streak++;
  localStorage.setItem("streak", streak);
  localStorage.setItem("lastDate", today);
  streakEl.innerText = streak;

  // save log
  const log = {
    date: today,
    energy: currentEnergy,
    activity: selectedActivity
  };

  logs.push(log);
  localStorage.setItem("logs", JSON.stringify(logs));

  alert("🔥 Brawo! Zapisane do dziennika!");

  // reset UI
  document.getElementById("activities-screen").classList.add("hidden");
  document.getElementById("energy-screen").classList.remove("hidden");

  selectedActivity = null;
  currentEnergy = null;
}

function goHome() {
  document.getElementById("energy-screen").classList.remove("hidden");
  document.getElementById("activities-screen").classList.add("hidden");
}

function goHistory() {
  alert("Tu będzie ekran historii 📅 (zrobimy go zaraz)");
}

</script>

</body>
</html>
